name: Claude Direct Push

# This workflow is triggered manually or can be called by other workflows.
# It configures git with the GH_PAT secret so Claude can push commits
# from this environment without exposing credentials in chat.

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with PAT
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Claude Deploy Bot"
          git config user.email "claude-deploy@a-list.app"
