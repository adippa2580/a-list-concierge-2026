name: Deploy A-List

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1

      - name: Check required secrets
        run: |
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::SUPABASE_PROJECT_ID is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy server --project-ref "$SUPABASE_PROJECT_ID"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install && npm run build
