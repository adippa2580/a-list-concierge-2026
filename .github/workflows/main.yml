name: Deploy A-List

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECT_ID }}" ]; then
            echo "Error: SUPABASE_PROJECT_ID secret is not set. Please configure it in repository settings."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "Error: SUPABASE_ACCESS_TOKEN secret is not set. Please configure it in repository settings."
            exit 1
          fi

      - name: Deploy Edge Functions
        run: supabase functions deploy server --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install && npm run build
